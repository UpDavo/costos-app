<div class="px-5 pb-5">
  <div
    class="flex items-center gap-[6px] text-[0.7rem] font-mono font-semibold tracking-widest uppercase text-[var(--muted)] mb-[14px]">
    <i class="pi pi-chart-pie text-[var(--primary)]"></i>
    Distribución de costos
  </div>
  <div class="flex items-center gap-5">
    <p-chart type="doughnut" [data]="chartData()" [options]="chartOptions"
      [style]="{ width: '148px', height: '148px' }" />
    <div class="flex flex-col gap-[6px] flex-1">
      @for (item of legendItems(); track item.label) {
      <div class="flex items-center gap-[7px] text-[0.73rem] text-[var(--muted)]">
        <span class="w-[9px] h-[9px] shrink-0"
          [style.background]="item.color"></span>
        <span class="flex-1">{{ item.label }}</span>
        <span class="font-semibold text-[0.72rem] text-[var(--text)]">{{ item.pct
          }}%</span>
      </div>
      }
    </div>
  </div>
</div>
