<footer class="bg-[#0F0F0F] text-white border-t border-white/10">
  <div
    class="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-white/10 border-b border-white/10">

    <!-- Brand -->
    <div class="p-8 lg:p-10">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-sm font-bold tracking-tighter uppercase">Calculadora de kilómetros</span>
      </div>
      <p class="font-mono text-xs text-gray-400 leading-relaxed">
        Estima el costo real por km antes de comprar un vehículo.
      </p>
    </div>

    <!-- Acerca de -->
    <div class="p-8 lg:p-10">
      <h5 class="font-mono text-[10px] text-white uppercase mb-5 font-bold tracking-widest">Acerca de</h5>
      <ul class="space-y-3 font-mono text-xs text-gray-400">
        @for (item of aboutItems; track item) {
          <li class="flex items-start gap-2">
            <span class="text-[#443FE9]">—</span>
            <span>{{ item }}</span>
          </li>
        }
      </ul>
    </div>

    <!-- Hecho por -->
    <div class="p-8 lg:p-10">
      <h5 class="font-mono text-[10px] text-white uppercase mb-5 font-bold tracking-widest">Fork de</h5>
      <div class="font-mono text-xs text-gray-400 space-y-2">
        <p class="text-white font-bold uppercase tracking-widest text-sm">Updavo</p>
      </div>
      <hr class="my-6 border-white/10" />
      <h5 class="font-mono text-[10px] text-white uppercase mb-5 font-bold tracking-widest">Créditos a Saúl Guevara - Impordispac</h5>
      
    </div>

  </div>

  <!-- Bottom bar -->
  <div
    class="py-4 px-6 md:px-10 flex flex-col md:flex-row justify-between items-center text-[10px] font-mono text-gray-500 uppercase gap-2">
    <div class="flex gap-4">
      <span>{{ year }}</span>
      <span>::</span>
      <span>Los valores son estimados de referencia</span>
    </div>
    <span>v{{ version }}</span>
  </div>

</footer>
