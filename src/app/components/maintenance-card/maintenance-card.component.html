<div class="p-4">
  @for (item of state.maintenanceItems(); track item.id) {
  <app-maintenance-item
    [item]="item"
    [currencySymbol]="appStore.selectedCountry().currencySymbol"
    [currencyCode]="appStore.selectedCountry().currency"
    (enabledChange)="state.updateMaintenanceItem(item.id, { enabled: $event })"
    (costChange)="state.updateMaintenanceItem(item.id, { cost: $event })"
    (everyChange)="state.updateMaintenanceItem(item.id, { every: $event })"
    (remove)="state.removeMaintenanceItem(item.id)" />
  }
  <button
    class="flex items-center justify-center gap-[6px] w-full py-[9px] bg-transparent border-[1.5px] border-dashed border-[var(--border2)] rounded-lg text-[var(--muted)] text-[0.78rem] font-medium cursor-pointer transition-all duration-150 mt-1 hover:border-[var(--primary)] hover:text-[var(--primary)] hover:bg-[var(--primary-dim)]"
    (click)="showDialog.set(true)">
    <i class="pi pi-plus"></i>
    Agregar ítem personalizado
  </button>
</div>

@if (showDialog()) {
<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40"
  (click)="closeDialog()">
  <div
    class="bg-white rounded-xl shadow-xl w-full max-w-[420px] border border-[var(--border)]"
    (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-[var(--border)]">
      <h2 class="text-[0.95rem] font-semibold text-[var(--text)]">
        Agregar ítem de mantenimiento
      </h2>
      <button
        class="w-8 h-8 flex items-center justify-center rounded-lg text-[var(--muted)] hover:bg-[var(--primary-dim)] hover:text-[var(--primary)] transition-colors cursor-pointer"
        (click)="closeDialog()">
        <i class="pi pi-times text-sm"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="flex flex-col gap-4 px-5 py-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-[var(--muted)]">Nombre del servicio</label>
        <input pInputText [(ngModel)]="newName"
          placeholder="Ej: Cambio de refrigerante" class="w-full" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-[var(--muted)]">
            Costo ({{ appStore.selectedCountry().currency }})
          </label>
          <p-inputnumber [(ngModel)]="newCost" [min]="1" [step]="1"
            [useGrouping]="false" inputStyleClass="input-field" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-[var(--muted)]">Cada cuántos km</label>
          <p-inputnumber [(ngModel)]="newEvery" [min]="100" [step]="100"
            [useGrouping]="false" inputStyleClass="input-field" />
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-2 px-5 py-3 border-t border-[var(--border)]">
      <button
        class="px-4 py-2 rounded-lg text-sm font-medium text-[var(--muted)] hover:bg-[var(--primary-dim)] hover:text-[var(--primary)] transition-colors cursor-pointer"
        (click)="closeDialog()">
        Cancelar
      </button>
      <button
        class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium text-white bg-[var(--primary)] hover:bg-[var(--primary-dark)] disabled:opacity-40 disabled:cursor-not-allowed transition-colors cursor-pointer"
        [disabled]="!newName.trim()"
        (click)="addItem()">
        <i class="pi pi-plus text-xs"></i>
        Agregar
      </button>
    </div>

  </div>
</div>
}
